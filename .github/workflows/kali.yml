name: Full Kali GUI via GitHub Actions + Tailscale

on:
  workflow_dispatch:

jobs:
  kali-gui:
    runs-on: ubuntu-latest
    container:
      image: kalilinux/kali-rolling:latest
      options: --privileged
    timeout-minutes: 360

    steps:
      - name: Update and Install Core
        run: |
          apt update
          apt install -y sudo curl wget gnupg2 dbus-x11 xfce4 xfce4-goodies xrdp xorgxrdp
          # Mock systemctl so the install script doesn't fail on systemd-less container
          sudo ln -sf /bin/true /usr/local/sbin/systemctl
          # Install Tailscale via official script
          curl -fsSL https://tailscale.com/install.sh | sh
          # Restore real systemctl path (best effort)
          sudo rm -f /usr/local/sbin/systemctl
          
      - name: Install Kali Tools
        run: |
          # We use headless/default to save space, but you can change this back to 'large'
          sudo apt install -y kali-linux-default

      - name: Create RDP User
        run: |
          sudo useradd -m kali || true
          echo "kali:KaliPassword123!" | sudo chpasswd
          sudo usermod -aG sudo kali

      - name: Configure XRDP
        run: |
          echo "exec startxfce4" | sudo tee /home/kali/.xsession
          sudo chown kali:kali /home/kali/.xsession
          
          # Configure XRDP to work in a container (no systemd)
          sudo sed -i 's/port=3389/port=3389/g' /etc/xrdp/xrdp.ini
          # Disable window management in xrdp for better container compatibility
          sudo sed -i 's/use_separate_auth=true/use_separate_auth=false/g' /etc/xrdp/sesman.ini

      - name: Start Services
        run: |
          # Start DBUS and XRDP manually since containers don't have systemd
          sudo mkdir -p /var/run/dbus
          sudo dbus-daemon --system --fork || true
          sudo xrdp-sesman
          sudo xrdp
          
      - name: Connect Tailscale
        run: |
          # Start Tailscale in the background
          sudo tailscaled --tun=userspace-networking --socks5-server=localhost:1055 &
          sleep 5
          sudo tailscale up --authkey=${{ secrets.TS_KEY }} --hostname=github-kali
          
      - name: Show Connection Info
        run: |
          echo "========== CONNECTION INFO =========="
          echo "Tailscale IP:"
          tailscale ip -4
          echo "User: kali"
          echo "Pass: KaliPassword123!"
          echo "====================================="

      - name: Keep Runner Alive
        run: |
          while true; do
            echo "[KEEPALIVE] Kali GUI container alive"
            sleep 60
          done
