name: Full Kali GUI via GitHub Actions + Tailscale

on:
  workflow_dispatch:

jobs:
  kali-gui:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Free Disk Space
        run: |
          # Remove unnecessary pre-installed software to free space for Kali tools
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo apt-get purge -y dotnet* google-cloud* azure-cli microsoft-edge* 2>/dev/null || true
          sudo apt-get autoremove -y
          df -h /

      - name: Add Kali Repository
        run: |
          curl -fsSL https://archive.kali.org/archive-key.asc | \
            sudo gpg --dearmor -o /usr/share/keyrings/kali-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/kali-archive-keyring.gpg] http://http.kali.org/kali kali-rolling main contrib non-free non-free-firmware" | \
            sudo tee /etc/apt/sources.list.d/kali.list

          # Hold ONLY base-files — the one package that causes the UsrMerge diversion crash.
          # Everything else (libc6, python3, perl) MUST be allowed to upgrade for Kali tools to work.
          sudo apt-mark hold base-files

          # Pre-fix rtkit: Kali's rtkit.conf uses 'u!' modifier that Ubuntu's systemd doesn't understand
          sudo mkdir -p /etc/sysusers.d
          echo 'u rtkit - "RealtimeKit" /proc' | sudo tee /etc/sysusers.d/rtkit.conf

          sudo apt update

      - name: Install Desktop + XRDP + Kali Tools
        run: |
          # Install everything in one shot so apt can resolve the full dependency tree.
          # force-confold keeps existing Ubuntu config files when Kali provides replacements.
          sudo DEBIAN_FRONTEND=noninteractive apt install -y \
            -o Dpkg::Options::="--force-confold" \
            -o Dpkg::Options::="--force-overwrite" \
            xfce4 xfce4-goodies xrdp dbus-x11 kali-linux-default || \
            (sudo sed -i 's/u!/u/g' /usr/lib/sysusers.d/rtkit.conf 2>/dev/null || true && \
             sudo DEBIAN_FRONTEND=noninteractive apt install -y -f \
               -o Dpkg::Options::="--force-confold" \
               -o Dpkg::Options::="--force-overwrite")

      - name: Create RDP User
        run: |
          sudo useradd -m kali || true
          echo "kali:KaliPassword123!" | sudo chpasswd
          sudo usermod -aG sudo kali

      - name: Configure XRDP
        run: |
          echo "exec startxfce4" | sudo tee /home/kali/.xsession
          sudo chown kali:kali /home/kali/.xsession
          echo "allowed_users=anybody" | sudo tee /etc/X11/Xwrapper.config
          sudo adduser xrdp ssl-cert || true
          sudo systemctl enable xrdp
          sudo systemctl restart xrdp

      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh

      - name: Connect Tailscale
        run: |
          sudo tailscale up --authkey=${{ secrets.TS_KEY }} --hostname=github-kali

      - name: Show Connection Info
        run: |
          echo "========== CONNECTION INFO =========="
          echo "Tailscale IP: $(tailscale ip -4)"
          echo "RDP Port:     3389"
          echo "User:         kali"
          echo "Pass:         KaliPassword123!"
          echo "====================================="

      - name: Keep Runner Alive
        run: |
          while true; do
            echo "[KEEPALIVE] Kali GUI runner alive"
            sleep 60
          done
