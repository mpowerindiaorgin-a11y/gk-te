name: Kali Terminal via tmate

on:
  workflow_dispatch:

jobs:
  kali-terminal:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo apt-get purge -y dotnet* google-cloud* azure-cli microsoft-edge* 2>/dev/null || true
          sudo apt-get autoremove -y
          df -h /

      - name: Start Kali Linux Container
        run: |
          docker pull kalilinux/kali-rolling:latest
          docker run -d --name kali \
            --network host \
            --privileged \
            kalilinux/kali-rolling:latest \
            bash -c "
              apt-get update && \
              DEBIAN_FRONTEND=noninteractive apt-get install -y \
                kali-linux-headless \
                kali-tools-top10 \
                kali-tools-web \
                kali-tools-passwords \
                kali-tools-exploitation && \
              tail -f /dev/null
            "
            
          # Create a wrapper so you can just type 'kali' in the terminal
          sudo tee /usr/local/bin/kali << 'WRAPPER'
          #!/bin/bash
          exec docker exec -it kali bash "$@"
          WRAPPER
          sudo chmod +x /usr/local/bin/kali

      - name: Setup SSH & Web Terminal (tmate)
        uses: mxschmitt/action-tmate@v3
        with:
          # Set this to true if you only want the user who triggered the action to connect
          limit-access-to-actor: false
